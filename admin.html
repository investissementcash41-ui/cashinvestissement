<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        ADMIN PANEL - CASHINVESTISSEMENT
    </title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {

            background:
                linear-gradient(135deg,
                    #020617,
                    #0f172a,
                    #1e3a8a,
                    #7f1d1d);

            color: white;

            min-height: 100vh;

            padding: 20px;

        }

        .header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            flex-wrap: wrap;

            gap: 15px;

            margin-bottom: 30px;

        }

        .logo {

            font-size: 26px;

            font-weight: bold;

            color: #38bdf8;

        }

        .logout {

            padding: 12px 20px;

            border: none;

            border-radius: 10px;

            background: #dc2626;

            color: white;

            cursor: pointer;

            font-size: 14px;

        }

        .cards {

            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(220px, 1fr));

            gap: 20px;

            margin-bottom: 30px;

        }

        .card {

            background:
                rgba(255, 255, 255, 0.05);

            padding: 20px;

            border-radius: 18px;

            border:
                1px solid rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(10px);

        }

        .card h3 {

            font-size: 15px;

            color: #d6d6d6;

            margin-bottom: 10px;

        }

        .card h2 {

            font-size: 24px;

            color: #38bdf8;

        }

        .section {

            background:
                rgba(255, 255, 255, 0.05);

            padding: 25px;

            border-radius: 18px;

            margin-bottom: 30px;

            border:
                1px solid rgba(255, 255, 255, 0.08);

        }

        .section h2 {

            margin-bottom: 20px;

            font-size: 20px;

            color: #ffffff;

        }

        .user,
        .depot,
        .retrait {

            background:
                rgba(255, 255, 255, 0.05);

            padding: 18px;

            border-radius: 15px;

            margin-bottom: 15px;

            border:
                1px solid rgba(255, 255, 255, 0.08);

        }

        .user p,
        .depot p,
        .retrait p {

            font-size: 14px;

            line-height: 28px;

            color: #d6d6d6;

        }

        .buttons {

            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(160px, 1fr));

            gap: 10px;

            margin-top: 15px;

        }

        .buttons button {

            padding: 12px;

            border: none;

            border-radius: 10px;

            cursor: pointer;

            font-size: 14px;

            color: white;

        }

        .green {

            background: #16a34a;

        }

        .red {

            background: #dc2626;

        }

        .blue {

            background: #2563eb;

        }

        .orange {

            background: #ea580c;

        }

        .input-box {

            margin-top: 15px;

        }

        .input-box input {

            width: 100%;

            padding: 14px;

            border: none;

            outline: none;

            border-radius: 10px;

            background:
                rgba(255, 255, 255, 0.08);

            color: white;

            font-size: 14px;

        }

        footer {

            text-align: center;

            margin-top: 40px;

            font-size: 13px;

            color: #94a3b8;

            line-height: 25px;

        }
    </style>

</head>

<body>

    <div class="header">

        <div class="logo">

            👑 ADMIN PANEL

        </div>

        <button class="logout" onclick="logout()">

            Déconnexion

        </button>

    </div>

    <div class="cards">

        <div class="card">

            <h3>

                Total Utilisateurs

            </h3>

            <h2 id="totalUsers">

                0

            </h2>

        </div>

        <div class="card">

            <h3>

                Total Dépôts

            </h3>

            <h2 id="totalDepots">

                0

            </h2>

        </div>

        <div class="card">

            <h3>

                Total Retraits

            </h3>

            <h2 id="totalRetraits">

                0

            </h2>

        </div>

        <div class="card">

            <h3>

                Plans Actifs

            </h3>

            <h2 id="totalPlans">

                0

            </h2>

        </div>

    </div>

    <div class="section">

        <h2>

            👥 Utilisateurs

        </h2>

        <div id="usersContainer">

        </div>

    </div>

    <div class="section">

        <h2>

            🏦 Demandes de Dépôt

        </h2>

        <div id="depotsContainer">

        </div>

    </div>

    <div class="section">

        <h2>

            💸 Demandes de Retrait

        </h2>

        <div id="retraitsContainer">

        </div>

    </div>

    <footer>

        © 1997 CASHINVESTISSEMENT

    </footer>

    <script type="module">

        import { initializeApp }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {

            getFirestore,
            collection,
            getDocs,
            doc,
            updateDoc,
            deleteDoc,
            getDoc

        }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        import {

            getAuth,
            signOut

        }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {

            apiKey: "AIzaSyCRIgagg1fOm_1fcYLCA79C44i2BKTiujQ",
            authDomain: "cashinvestissement-f8104.firebaseapp.com",
            projectId: "cashinvestissement-f8104",
            storageBucket: "cashinvestissement-f8104.firebasestorage.app",
            messagingSenderId: "645010004253",
            appId: "1:645010004253:web:e885536adcc0f1966e69f4"

        };

        const app =
            initializeApp(firebaseConfig);

        const db =
            getFirestore(app);

        const auth =
            getAuth(app);

        async function loadUsers() {

            const querySnapshot =
                await getDocs(
                    collection(db, "users")
                );

            document.getElementById(
                "totalUsers"
            ).innerText =
                querySnapshot.size;

            let totalPlans = 0;

            const container =
                document.getElementById(
                    "usersContainer"
                );

            container.innerHTML = "";

            querySnapshot.forEach((docu) => {

                const data =
                    docu.data();

                totalPlans +=
                    data.plans.length;

                container.innerHTML += `

<div class="user">

<p>

Nom :
${data.nom}<br>

Email :
${data.email}<br>

Solde Principal :
${data.solde} HTG<br>

HTG Fidélité :
${data.fidelite} HTG<br>

Solde Parrainage :
${data.parrainage} HTG<br>

Total Investi :
${data.totalInvesti} HTG<br>

Gains Quotidiens :
${data.gainsQuotidiens} HTG<br>

Plans Actifs :
${data.plans.length}<br>

Compte :
${data.blocked ? "Bloqué" : "Actif"}

</p>

<div class="buttons">

<button class="green"

onclick="ajouterArgent(
'${docu.id}'
)">

Ajouter Argent

</button>

<button class="orange"

onclick="retirerArgent(
'${docu.id}'
)">

Retirer Argent

</button>

<button class="red"

onclick="bloquerCompte(
'${docu.id}'
)">

Bloquer

</button>

<button class="blue"

onclick="debloquerCompte(
'${docu.id}'
)">

Débloquer

</button>

<button class="red"

onclick="supprimerCompte(
'${docu.id}'
)">

Supprimer

</button>

</div>

</div>

`;

            });

            document.getElementById(
                "totalPlans"
            ).innerText =
                totalPlans;

        }

        async function loadDepots() {

            const querySnapshot =
                await getDocs(
                    collection(db, "depotDemandes")
                );

            document.getElementById(
                "totalDepots"
            ).innerText =
                querySnapshot.size;

            const container =
                document.getElementById(
                    "depotsContainer"
                );

            container.innerHTML = "";

            querySnapshot.forEach((docu) => {

                const data =
                    docu.data();

                container.innerHTML += `

<div class="depot">

<p>

UID :
${data.uid}<br>

Méthode :
${data.methode}<br>

Montant :
${data.montant} HTG<br>

Transaction :
${data.transaction}<br>

Status :
${data.status}

</p>

<div class="buttons">

<button class="green"

onclick="validerDepot(
'${docu.id}',
'${data.uid}',
${data.montant}
)">

Valider Dépôt

</button>

<button class="red"

onclick="refuserDepot(
'${docu.id}'
)">

Refuser

</button>

</div>

</div>

`;

            });

        }

        async function loadRetraits() {

            const querySnapshot =
                await getDocs(
                    collection(db, "retraits")
                );

            document.getElementById(
                "totalRetraits"
            ).innerText =
                querySnapshot.size;

            const container =
                document.getElementById(
                    "retraitsContainer"
                );

            container.innerHTML = "";

            querySnapshot.forEach((docu) => {

                const data =
                    docu.data();

                container.innerHTML += `

<div class="retrait">

<p>

UID :
${data.uid}<br>

Méthode :
${data.methode}<br>

Nom :
${data.nom}<br>

Numéro :
${data.numero}<br>

Montant :
${data.montant} HTG<br>

Status :
${data.status}

</p>

<div class="buttons">

<button class="green"

onclick="validerRetrait(
'${docu.id}'
)">

Valider

</button>

<button class="red"

onclick="refuserRetrait(
'${docu.id}'
)">

Refuser

</button>

</div>

</div>

`;

            });

        }

        window.ajouterArgent =
            async function (uid) {

                const montant =
                    prompt(
                        "Montant à ajouter"
                    );

                if (!montant) return;

                const userRef =
                    doc(db, "users", uid);

                const userSnap =
                    await getDoc(userRef);

                const data =
                    userSnap.data();

                await updateDoc(userRef, {

                    solde:
                        Number(data.solde)
                        +
                        Number(montant)

                });

                alert(
                    "Argent ajouté avec succès."
                );

                location.reload();

            }

        window.retirerArgent =
            async function (uid) {

                const montant =
                    prompt(
                        "Montant à retirer"
                    );

                if (!montant) return;

                const userRef =
                    doc(db, "users", uid);

                const userSnap =
                    await getDoc(userRef);

                const data =
                    userSnap.data();

                await updateDoc(userRef, {

                    solde:
                        Number(data.solde)
                        -
                        Number(montant)

                });

                alert(
                    "Argent retiré."
                );

                location.reload();

            }

        window.bloquerCompte =
            async function (uid) {

                await updateDoc(

                    doc(db, "users", uid),

                    {

                        blocked: true

                    }

                );

                alert(
                    "Compte bloqué."
                );

                location.reload();

            }

        window.debloquerCompte =
            async function (uid) {

                await updateDoc(

                    doc(db, "users", uid),

                    {

                        blocked: false

                    }

                );

                alert(
                    "Compte débloqué."
                );

                location.reload();

            }

        window.supprimerCompte =
            async function (uid) {

                if (
                    confirm(
                        "Supprimer ce compte ?"
                    )

                ) {

                    await deleteDoc(
                        doc(db, "users", uid)
                    );

                    alert(
                        "Compte supprimé."
                    );

                    location.reload();

                }

            }

        window.validerDepot =
            async function (

                depotId,
                uid,
                montant

            ) {

                const userRef =
                    doc(db, "users", uid);

                const userSnap =
                    await getDoc(userRef);

                const data =
                    userSnap.data();

                await updateDoc(userRef, {

                    solde:
                        Number(data.solde)
                        +
                        Number(montant)

                });

                await updateDoc(

                    doc(db, "depotDemandes", depotId),

                    {

                        status: "Validé"

                    }

                );

                alert(
                    "Dépôt validé."
                );

                location.reload();

            }

        window.refuserDepot =
            async function (depotId) {

                await updateDoc(

                    doc(db, "depotDemandes", depotId),

                    {

                        status: "Refusé"

                    }

                );

                alert(
                    "Dépôt refusé."
                );

                location.reload();

            }

        window.validerRetrait =
            async function (retraitId) {

                await updateDoc(

                    doc(db, "retraits", retraitId),

                    {

                        status: "Validé"

                    }

                );

                alert(
                    "Retrait validé."
                );

                location.reload();

            }

        window.refuserRetrait =
            async function (retraitId) {

                await updateDoc(

                    doc(db, "retraits", retraitId),

                    {

                        status: "Refusé"

                    }

                );

                alert(
                    "Retrait refusé."
                );

                location.reload();

            }

        window.logout =
            async function () {

                await signOut(auth);

                window.location.href =
                    "login.html";

            }

        loadUsers();

        loadDepots();

        loadRetraits();

    </script>

</body>

</html>
