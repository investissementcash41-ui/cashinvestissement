<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - CashInvestissement</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            background: #111827;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #22c55e;
        }

        .container {
            padding: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            margin: 10px 0;
            color: #22c55e;
        }

        .section {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            outline: none;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .user {
            background: #0f172a;
            padding: 15px;
            margin-top: 10px;
            border-radius: 10px;
        }

        .actions button {
            margin-top: 8px;
        }

        .red {
            background: red;
        }

        .orange {
            background: orange;
        }

        .blue {
            background: #3b82f6;
        }
    </style>
</head>

<body>

    <header>
        👑 CASHINVESTISSEMENT ADMIN PANEL
    </header>

    <div class="container">

        <div class="cards">

            <div class="card">
                <h3>Total Utilisateurs</h3>
                <h2 id="totalUsers">0</h2>
            </div>

            <div class="card">
                <h3>Total Dépôts</h3>
                <h2 id="totalDepots">0</h2>
            </div>

            <div class="card">
                <h3>Total Retraits</h3>
                <h2 id="totalRetraits">0</h2>
            </div>

        </div>

        <div class="section">

            <h2>➕ Ajouter Solde Utilisateur</h2>

            <input type="text" id="uid" placeholder="UID utilisateur">
            <input type="number" id="montant" placeholder="Montant">

            <button onclick="ajouterSolde()">
                Ajouter Solde
            </button>

        </div>

        <div class="section">

            <h2>🔒 Bloquer / Débloquer Compte</h2>

            <input type="text" id="blockUid" placeholder="UID utilisateur">

            <button class="red" onclick="bloquerCompte()">
                Bloquer Compte
            </button>

            <button class="blue" onclick="debloquerCompte()">
                Débloquer Compte
            </button>

        </div>

        <div class="section">

            <h2>🔑 Réinitialiser Mot de Passe</h2>

            <input type="text" id="resetEmail" placeholder="Email utilisateur">

            <button class="orange" onclick="resetPassword()">
                Envoyer Nouveau Mot de Passe
            </button>

        </div>

        <div class="section">

            <h2>👥 Tous les Utilisateurs</h2>

            <div id="usersContainer"></div>

        </div>

    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {
            getFirestore,
            collection,
            getDocs,
            doc,
            updateDoc,
            increment
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        import {
            getAuth,
            sendPasswordResetEmail
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {

            apiKey: "AIzaSyCRIgagg1fOm_1fcYLCA79C44i2BKTiujQ",
            authDomain: "cashinvestissement-f8104.firebaseapp.com",
            projectId: "cashinvestissement-f8104",
            storageBucket: "cashinvestissement-f8104.firebasestorage.app",
            messagingSenderId: "645010004253",
            appId: "1:645010004253:web:e885536adcc0f1966e69f4"

        };

        const app = initializeApp(firebaseConfig);

        const db = getFirestore(app);

        const auth = getAuth(app);

        async function chargerUtilisateurs() {

            const querySnapshot = await getDocs(collection(db, "users"));

            document.getElementById("totalUsers").innerText =
                querySnapshot.size;

            const container =
                document.getElementById("usersContainer");

            container.innerHTML = "";

            querySnapshot.forEach((docu) => {

                const data = docu.data();

                container.innerHTML += `

<div class="user">

<h3>${data.nom || "Utilisateur"}</h3>

<p>Email : ${data.email}</p>

<p>Solde : $${data.solde || 0}</p>

<p>UID : ${docu.id}</p>

<p>Status : ${data.blocked ? "Bloqué" : "Actif"}</p>

</div>

`;

            });

        }

        window.ajouterSolde = async function () {

            const uid =
                document.getElementById("uid").value;

            const montant =
                Number(document.getElementById("montant").value);

            if (uid === "" || montant === "") {

                alert("Remplir tous les champs");

                return;

            }

            const userRef = doc(db, "users", uid);

            await updateDoc(userRef, {
                solde: increment(montant)
            });

            alert("Solde ajouté avec succès");

            chargerUtilisateurs();

        }

        window.bloquerCompte = async function () {

            const uid =
                document.getElementById("blockUid").value;

            await updateDoc(doc(db, "users", uid), {
                blocked: true
            });

            alert("Compte bloqué");

            chargerUtilisateurs();

        }

        window.debloquerCompte = async function () {

            const uid =
                document.getElementById("blockUid").value;

            await updateDoc(doc(db, "users", uid), {
                blocked: false
            });

            alert("Compte débloqué");

            chargerUtilisateurs();

        }

        window.resetPassword = async function () {

            const email =
                document.getElementById("resetEmail").value;

            await sendPasswordResetEmail(auth, email);

            alert("Email de réinitialisation envoyé");

        }

        chargerUtilisateurs();

    </script>

</body>

</html>
