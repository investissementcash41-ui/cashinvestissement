    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {

            background:
                linear-gradient(135deg, #020617, #0f172a, #1e3a8a, #7f1d1d);

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;

            color: white;

        }

        .container {

            width: 100%;

            max-width: 650px;

            background: rgba(255, 255, 255, 0.05);

            padding: 45px;

            border-radius: 30px;

            border: 1px solid rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(15px);

            box-shadow: 0 0 35px rgba(0, 0, 0, 0.5);

            text-align: center;

        }

        .logo {

            font-size: 40px;

            font-weight: bold;

            margin-bottom: 20px;

            color: #38bdf8;

            text-shadow: 0 0 15px #38bdf8;

        }

        .title {

            font-size: 35px;

            margin-bottom: 25px;

            color: #ffd60a;

        }

        .text {

            font-size: 18px;

            line-height: 35px;

            color: #d6d6d6;

            margin-bottom: 35px;

        }

        .buttons {

            display: flex;

            justify-content: center;

            gap: 20px;

            flex-wrap: wrap;

        }

        .btn {

            padding: 16px 30px;

            border: none;

            border-radius: 15px;

            font-size: 17px;

            font-weight: bold;

            cursor: pointer;

            text-decoration: none;

            color: white;

            transition: 0.3s;

        }

        .home {

            background:
                linear-gradient(90deg, #2563eb, #38bdf8);

        }

        .login {

            background:
                linear-gradient(90deg, #dc2626, #f59e0b);

        }

        .btn:hover {

            transform: scale(1.05);

        }

        .footer {

            margin-top: 35px;

            font-size: 13px;

            color: #94a3b8;

        }
    </style>

</head>

<body>

            </a>

        </div>

            CASHINVESTISSEMENT © 2026
