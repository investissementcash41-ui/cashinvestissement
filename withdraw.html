<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Retrait - CASHINVESTISSEMENT</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {

            background:
                linear-gradient(135deg, #020617, #0f172a, #1e3a8a, #7f1d1d);

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;

            color: white;

        }

        .container {

            width: 100%;

            max-width: 600px;

            background: rgba(255, 255, 255, 0.05);

            padding: 35px;

            border-radius: 25px;

            border: 1px solid rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(15px);

            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);

        }

        .logo {

            text-align: center;

            font-size: 34px;

            font-weight: bold;

            margin-bottom: 15px;

            color: #38bdf8;

            text-shadow: 0 0 15px #38bdf8;

        }

        .title {

            text-align: center;

            font-size: 24px;

            margin-bottom: 30px;

            color: #ffd60a;

        }

        select,
        input {

            width: 100%;

            padding: 16px;

            margin-top: 18px;

            border: none;

            outline: none;

            border-radius: 14px;

            background: rgba(255, 255, 255, 0.08);

            color: white;

            font-size: 16px;

        }

        select option {

            color: black;

        }

        button {

            width: 100%;

            padding: 16px;

            margin-top: 25px;

            border: none;

            border-radius: 14px;

            background:
                linear-gradient(90deg, #dc2626, #f59e0b);

            color: white;

            font-size: 17px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;

        }

        button:hover {

            transform: scale(1.03);

        }

        .info {

            margin-top: 20px;

            text-align: center;

            line-height: 30px;

            font-size: 14px;

            color: #d6d6d6;

        }

        .footer {

            margin-top: 30px;

            text-align: center;

            font-size: 13px;

            color: #94a3b8;

        }
    </style>

</head>

<body>

    <div class="container">

        <div class="logo">

            CASHINVESTISSEMENT

        </div>

        <div class="title">

            Demande de retrait

        </div>

        <select id="methode">

            <option value="">Choisissez une méthode</option>

            <option>MonCash</option>

            <option>NatCash</option>

            <option>USDT</option>

            <option>USD</option>

        </select>

        <input type="text" id="nom" placeholder="Nom du titulaire du compte">

        <input type="text" id="numero" placeholder="Numéro ou adresse de réception">

        <input type="number" id="montant" placeholder="Montant à retirer">

        <button onclick="envoyerRetrait()">

            Confirmer la demande de retrait

        </button>

        <div class="info">

            Après confirmation de votre demande,
            le montant sera déduit de votre solde.
            Veuillez ensuite contacter un administrateur
            afin de recevoir votre paiement dans un délai
            maximum de 5 heures.

        </div>

        <div class="footer">

            CASHINVESTISSEMENT © 2026

        </div>

    </div>

    <script type="module">

        import { initializeApp }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {

            getAuth,
            onAuthStateChanged

        }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        import {

            getFirestore,
            collection,
            addDoc,
            doc,
            getDoc,
            updateDoc

        }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {

            apiKey: "AIzaSyCRIgagg1fOm_1fcYLCA79C44i2BKTiujQ",
            authDomain: "cashinvestissement-f8104.firebaseapp.com",
            projectId: "cashinvestissement-f8104",
            storageBucket: "cashinvestissement-f8104.firebasestorage.app",
            messagingSenderId: "645010004253",
            appId: "1:645010004253:web:e885536adcc0f1966e69f4"

        };

        const app = initializeApp(firebaseConfig);

        const auth = getAuth(app);

        const db = getFirestore(app);

        let currentUser = null;

        let solde = 0;

        onAuthStateChanged(auth, async (user) => {

            if (user) {

                currentUser = user;

                const userRef =
                    doc(db, "users", user.uid);

                const userSnap =
                    await getDoc(userRef);

                if (userSnap.exists()) {

                    solde =
                        userSnap.data().solde || 0;

                }

            } else {

                window.location.href =
                    "login.html";

            }

        });

        window.envoyerRetrait =
            async function () {

                const methode =
                    document.getElementById("methode").value;

                const nom =
                    document.getElementById("nom").value;

                const numero =
                    document.getElementById("numero").value;

                const montant =
                    Number(
                        document.getElementById("montant").value
                    );

                if (
                    methode == "" ||
                    nom == "" ||
                    numero == "" ||
                    montant == ""
                ) {

                    alert(
                        "Veuillez remplir tous les champs."
                    );

                    return;

                }

                if (montant > solde) {

                    alert(
                        "Solde insuffisant pour effectuer ce retrait."
                    );

                    return;

                }

                await addDoc(

                    collection(db, "retraits"),

                    {

                        uid: currentUser.uid,

                        email: currentUser.email,

                        methode: methode,

                        nom: nom,

                        numero: numero,

                        montant: montant,

                        statut: "En attente",

                        date: new Date()

                    }

                );

                await updateDoc(

                    doc(db, "users", currentUser.uid),

                    {

                        solde: solde - montant

                    }

                );

                solde = solde - montant;

                alert(

                    "Votre demande de retrait a été envoyée avec succès ✅\n\nVeuillez maintenant contacter un administrateur afin de recevoir votre paiement le plus rapidement possible.\n\nDélai maximum : 5 heures."

                );

                window.location.href =
                    "https://wa.me/50931465733";

            }

    </script>

</body>

</html>
