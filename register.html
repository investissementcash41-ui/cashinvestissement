<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inscription - CASHINVESTISSEMENT</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {

            background:
                linear-gradient(135deg, #020617, #0f172a, #1e3a8a, #7f1d1d);

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;

            color: white;

        }

        .container {

            width: 100%;

            max-width: 520px;

            background: rgba(255, 255, 255, 0.05);

            padding: 40px;

            border-radius: 25px;

            border: 1px solid rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(15px);

            box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);

        }

        .logo {

            text-align: center;

            font-size: 34px;

            font-weight: bold;

            margin-bottom: 15px;

            color: #38bdf8;

            text-shadow: 0 0 15px #38bdf8;

        }

        .title {

            text-align: center;

            font-size: 24px;

            margin-bottom: 30px;

            color: #ffd60a;

        }

        input {

            width: 100%;

            padding: 16px;

            margin-top: 18px;

            border: none;

            outline: none;

            border-radius: 14px;

            background: rgba(255, 255, 255, 0.08);

            color: white;

            font-size: 16px;

        }

        button {

            width: 100%;

            padding: 16px;

            margin-top: 25px;

            border: none;

            border-radius: 14px;

            background:
                linear-gradient(90deg, #dc2626, #f59e0b);

            color: white;

            font-size: 17px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;

        }

        button:hover {

            transform: scale(1.03);

        }

        .login {

            margin-top: 25px;

            text-align: center;

            font-size: 15px;

        }

        .login a {

            color: #38bdf8;

            text-decoration: none;

            font-weight: bold;

        }

        .footer {

            margin-top: 30px;

            text-align: center;

            font-size: 13px;

            color: #94a3b8;

        }
    </style>

</head>

<body>

    <div class="container">

        <div class="logo">

            CASHINVESTISSEMENT

        </div>

        <div class="title">

            Créer un compte

        </div>

        <input type="text" id="nom" placeholder="Nom complet">

        <input type="email" id="email" placeholder="Adresse email">

        <input type="password" id="password" placeholder="Mot de passe">

        <button onclick="register()">

            Créer mon compte

        </button>

        <div class="login">

            Vous avez déjà un compte ?

            <a href="login.html">

                Connexion

            </a>

        </div>

        <div class="footer">

            CASHINVESTISSEMENT © 2026

        </div>

    </div>

    <script type="module">

        import { initializeApp }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {

            getAuth,
            createUserWithEmailAndPassword

        }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        import {

            getFirestore,
            doc,
            setDoc

        }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRIgagg1fOm_1fcYLCA79C44i2BKTiujQ",
            authDomain: "cashinvestissement-f8104.firebaseapp.com",
            projectId: "cashinvestissement-f8104",
            storageBucket: "cashinvestissement-f8104.firebasestorage.app",
            messagingSenderId: "645010004253",
            appId: "1:645010004253:web:e885536adcc0f1966e69f4"


        };

        const app = initializeApp(firebaseConfig);

        const auth = getAuth(app);

        const db = getFirestore(app);

        console.log("Firebase connecté avec succès 🔥");

        window.register = async function () {

            const nom =
                document.getElementById("nom").value;

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;

            if (nom == "" || email == "" || password == "") {

                alert(
                    "Veuillez remplir tous les champs."
                );

                return;

            }

            try {

                const userCredential =
                    await createUserWithEmailAndPassword(

                        auth,
                        email,
                        password

                    );

                const user =
                    userCredential.user;

                await setDoc(

                    doc(db, "users", user.uid),

                    {

                        nom: nom,

                        email: email,

                        solde: 0,

                        dateCreation: new Date()

                    }

                );

                alert(
                    "Compte créé avec succès ✅"
                );

                window.location.href =
                    "dashboard.html";

            } catch (error) {

                alert(
                    "Impossible de créer le compte."
                );

            }

        }

    </script>

</body>

</html>
