<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - CashInvestissement</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        header {
            background: #004aad;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .1);
        }

        h2 {
            text-align: center;
            color: #004aad;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #004aad;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #003080;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
        }

        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .6);
        }

        .popup-content {
            background: white;
            width: 90%;
            max-width: 350px;
            margin: 120px auto;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <header>
        <h1>CashInvestissement</h1>
    </header>

    <div class="container">
        <div class="card">

            <h2>Créer un compte</h2>

            <input type="text" id="fullName" placeholder="Nom complet">

            <input type="email" id="email" placeholder="Adresse Email">

            <input type="text" id="phone" placeholder="Téléphone">

            <input type="password" id="password" placeholder="Mot de passe">

            <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe">

            <input type="text" id="referralCode" placeholder="Code de parrainage (optionnel)">

            <button id="registerBtn">
                Créer mon compte
            </button>

            <div class="login-link">
                Déjà inscrit ?
                <a href="login.html">Connexion</a>
            </div>

        </div>
    </div>

    <div class="popup" id="successPopup">
        <div class="popup-content">
            <h3>Compte créé avec succès</h3>
            <p>Bienvenue sur CashInvestissement.</p>
            <button id="okBtn">OK</button>
        </div>
    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {
            getAuth,
            createUserWithEmailAndPassword
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        import {
            getFirestore,
            doc,
            setDoc,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRIgagg1fOm_1fcYLCA79C44i2BKTiujQ",
            authDomain: "cashinvestissement-f8104.firebaseapp.com",
            projectId: "cashinvestissement-f8104",
            storageBucket: "cashinvestissement-f8104.firebasestorage.app",
            messagingSenderId: "645010004253",
            appId: "1:645010004253:web:e885536adcc0f1966e69f4"

        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function generateReferralCode() {
            return "CI" + Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        document.getElementById("registerBtn")
            .addEventListener("click", async () => {

                const fullName =
                    document.getElementById("fullName").value.trim();

                const email =
                    document.getElementById("email").value.trim();

                const phone =
                    document.getElementById("phone").value.trim();

                const password =
                    document.getElementById("password").value;

                const confirmPassword =
                    document.getElementById("confirmPassword").value;

                const referralCodeInput =
                    document.getElementById("referralCode").value.trim();

                if (
                    !fullName ||
                    !email ||
                    !phone ||
                    !password ||
                    !confirmPassword
                ) {
                    alert("Veuillez remplir tous les champs.");
                    return;
                }

                if (password !== confirmPassword) {
                    alert("Les mots de passe ne correspondent pas.");
                    return;
                }

                try {

                    const userCredential =
                        await createUserWithEmailAndPassword(
                            auth,
                            email,
                            password
                        );

                    const user = userCredential.user;

                    await setDoc(
                        doc(db, "users", user.uid),
                        {
                            fullName: fullName,
                            email: email,
                            phone: phone,

                            referralCode:
                                generateReferralCode(),

                            referredBy:
                                referralCodeInput || "",

                            role: "user",
                            status: "active",

                            soldeInvestissement: 0,
                            soldePrincipal: 0,
                            soldeParrainage: 0,

                            totalDepots: 0,
                            totalRetraits: 0,
                            totalInvestissements: 0,
                            totalGains: 0,

                            nombreFilleuls: 0,

                            bonusFideliteAccorde: false,
                            premierDepotValide: false,
                            compteBloque: false,

                            dateInscription:
                                serverTimestamp()
                        }
                    );

                    document.getElementById(
                        "successPopup"
                    ).style.display = "block";

                } catch (error) {

                    alert(error.message);

                }

            });

        document.getElementById("okBtn")
            .addEventListener("click", () => {

                window.location.href =
                    "dashboard.html";

            });

    </script>

</body>

</html>
