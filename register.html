<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Inscription - CASHINVESTISSEMENT
    </title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {

            background:
                linear-gradient(135deg,
                    #020617,
                    #0f172a,
                    #1e3a8a,
                    #7f1d1d);

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;

            color: white;

        }

        .container {

            width: 100%;

            max-width: 500px;

            background:
                rgba(255, 255, 255, 0.05);

            padding: 35px;

            border-radius: 25px;

            backdrop-filter: blur(15px);

            border:
                1px solid rgba(255, 255, 255, 0.08);

            box-shadow:
                0 0 30px rgba(0, 0, 0, 0.4);

        }

        .logo {

            text-align: center;

            font-size: 28px;

            font-weight: bold;

            margin-bottom: 10px;

            color: #38bdf8;

        }

        .title {

            text-align: center;

            font-size: 20px;

            margin-bottom: 25px;

            color: white;

        }

        .input-box {

            margin-top: 18px;

        }

        .input-box label {

            display: block;

            margin-bottom: 8px;

            font-size: 14px;

            color: #d6d6d6;

        }

        .input-box input {

            width: 100%;

            padding: 15px;

            border: none;

            outline: none;

            border-radius: 12px;

            background:
                rgba(255, 255, 255, 0.08);

            color: white;

            font-size: 14px;

        }

        .input-box input::placeholder {

            color: #94a3b8;

        }

        .register-btn {

            width: 100%;

            padding: 15px;

            margin-top: 25px;

            border: none;

            border-radius: 12px;

            background:
                linear-gradient(90deg,
                    #2563eb,
                    #dc2626);

            color: white;

            font-size: 15px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;

        }

        .register-btn:hover {

            transform: scale(1.03);

        }

        .info {

            margin-top: 20px;

            padding: 15px;

            border-radius: 12px;

            background:
                rgba(34, 197, 94, 0.15);

            font-size: 14px;

            line-height: 28px;

            color: #bbf7d0;

            text-align: center;

        }

        .error {

            margin-top: 15px;

            padding: 15px;

            border-radius: 12px;

            background:
                rgba(220, 38, 38, 0.15);

            font-size: 14px;

            line-height: 28px;

            display: none;

            color: #fecaca;

            text-align: center;

        }

        .links {

            margin-top: 20px;

            text-align: center;

        }

        .links a {

            color: #38bdf8;

            font-size: 14px;

            text-decoration: none;

        }

        footer {

            text-align: center;

            margin-top: 25px;

            font-size: 13px;

            color: #94a3b8;

            line-height: 25px;

        }
    </style>

</head>

<body>

    <div class="container">

        <div class="logo">

            CASHINVESTISSEMENT

        </div>

        <div class="title">

            Créer un compte

        </div>

        <div class="info">

            🎁 Chaque nouvel utilisateur reçoit automatiquement
            100 HTG de fidélité après inscription.

        </div>

        <div class="error" id="errorBox">

        </div>

        <div class="input-box">

            <label>

                Nom complet

            </label>

            <input type="text" id="nom" placeholder="Entrez votre nom complet">

        </div>

        <div class="input-box">

            <label>

                Adresse email

            </label>

            <input type="email" id="email" placeholder="Entrez votre adresse email">

        </div>

        <div class="input-box">

            <label>

                Mot de passe

            </label>

            <input type="password" id="password" placeholder="Entrez votre mot de passe">

        </div>

        <div class="input-box">

            <label>

                Confirmer le mot de passe

            </label>

            <input type="password" id="confirmPassword" placeholder="Confirmez votre mot de passe">

        </div>

        <div class="input-box">

            <label>

                Code de parrainage
                (optionnel)

            </label>

            <input type="text" id="parrainage" placeholder="Entrez un code de parrainage">

        </div>

        <button class="register-btn" onclick="register()">

            Créer mon compte

        </button>

        <div class="links">

            <a href="login.html">

                J’ai déjà un compte

            </a>

        </div>

        <footer>

            © 1997 CASHINVESTISSEMENT<br>

            Plateforme internationale d’investissement.

        </footer>

    </div>

    <script type="module">

        import { initializeApp }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {

            getAuth,
            createUserWithEmailAndPassword

        }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        import {

            getFirestore,
            doc,
            setDoc

        }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {

            apiKey: "AIzaSyCRIgagg1fOm_1fcYLCA79C44i2BKTiujQ",
            authDomain: "cashinvestissement-f8104.firebaseapp.com",
            projectId: "cashinvestissement-f8104",
            storageBucket: "cashinvestissement-f8104.firebasestorage.app",
            messagingSenderId: "645010004253",
            appId: "1:645010004253:web:e885536adcc0f1966e69f4"

        };

        const app =
            initializeApp(firebaseConfig);

        const auth =
            getAuth(app);

        const db =
            getFirestore(app);

        function showError(message) {

            const box =
                document.getElementById(
                    "errorBox"
                );

            box.style.display =
                "block";

            box.innerText =
                message;

            setTimeout(() => {

                box.style.display =
                    "none";

            }, 4000);

        }

        window.register =
            async function () {

                const nom =
                    document.getElementById(
                        "nom"
                    ).value;

                const email =
                    document.getElementById(
                        "email"
                    ).value;

                const password =
                    document.getElementById(
                        "password"
                    ).value;

                const confirmPassword =
                    document.getElementById(
                        "confirmPassword"
                    ).value;

                const parrainage =
                    document.getElementById(
                        "parrainage"
                    ).value;

                if (
                    nom === "" ||
                    email === "" ||
                    password === "" ||
                    confirmPassword === ""

                ) {

                    showError(
                        "Veuillez remplir tous les champs."
                    );

                    return;

                }

                if (password !== confirmPassword) {

                    showError(
                        "Les mots de passe ne correspondent pas."
                    );

                    return;

                }

                if (password.length < 6) {

                    showError(
                        "Le mot de passe doit contenir au moins 6 caractères."
                    );

                    return;

                }

                try {

                    const userCredential =

                        await createUserWithEmailAndPassword(

                            auth,
                            email,
                            password

                        );

                    const user =
                        userCredential.user;

                    const codeParrainage =

                        "CASH" +

                        Math.floor(
                            100000 + Math.random() * 900000
                        );

                    await setDoc(

                        doc(db, "users", user.uid),

                        {

                            uid: user.uid,

                            nom: nom,

                            email: email,

                            solde: 0,

                            fidelite: 100,

                            parrainage: 0,

                            totalInvesti: 0,

                            gainsQuotidiens: 0,

                            plans: [],

                            blocked: false,

                            codeParrainage:
                                codeParrainage,

                            codeUtilise:
                                parrainage || "",

                            dateInscription:
                                new Date().toLocaleString()

                        }

                    );

                    window.location.href =
                        "dashboard.html";

                } catch (error) {

                    showError(
                        "Impossible de créer le compte."
                    );

                }

            }

    </script>

</body>

</html>
