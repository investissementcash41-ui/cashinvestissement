<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Connexion - CASHINVESTISSEMENT
    </title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {

            background:
                linear-gradient(135deg,
                    #020617,
                    #0f172a,
                    #1e3a8a,
                    #7f1d1d);

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;

            color: white;

        }

        .container {

            width: 100%;

            max-width: 450px;

            background:
                rgba(255, 255, 255, 0.05);

            padding: 35px;

            border-radius: 25px;

            backdrop-filter: blur(15px);

            border:
                1px solid rgba(255, 255, 255, 0.08);

            box-shadow:
                0 0 30px rgba(0, 0, 0, 0.4);

        }

        .logo {

            text-align: center;

            font-size: 26px;

            font-weight: bold;

            margin-bottom: 15px;

            color: #38bdf8;

        }

        .title {

            text-align: center;

            font-size: 20px;

            margin-bottom: 25px;

            color: #ffffff;

        }

        .input-box {

            margin-top: 18px;

        }

        .input-box label {

            font-size: 14px;

            color: #d6d6d6;

            display: block;

            margin-bottom: 8px;

        }

        .input-box input {

            width: 100%;

            padding: 15px;

            border: none;

            outline: none;

            border-radius: 12px;

            background:
                rgba(255, 255, 255, 0.08);

            color: white;

            font-size: 15px;

        }

        .input-box input::placeholder {

            color: #94a3b8;

        }

        .login-btn {

            width: 100%;

            padding: 15px;

            margin-top: 25px;

            border: none;

            border-radius: 12px;

            background:
                linear-gradient(90deg,
                    #2563eb,
                    #dc2626);

            color: white;

            font-size: 15px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;

        }

        .login-btn:hover {

            transform: scale(1.03);

        }

        .links {

            margin-top: 20px;

            display: flex;

            justify-content: space-between;

            align-items: center;

            gap: 10px;

            flex-wrap: wrap;

        }

        .links a {

            font-size: 14px;

            text-decoration: none;

            color: #38bdf8;

        }

        .footer {

            text-align: center;

            margin-top: 25px;

            font-size: 13px;

            color: #94a3b8;

            line-height: 25px;

        }

        .error {

            background:
                rgba(220, 38, 38, 0.15);

            padding: 12px;

            border-radius: 10px;

            margin-top: 15px;

            font-size: 14px;

            display: none;

            color: #fecaca;

        }

        .success {

            background:
                rgba(34, 197, 94, 0.15);

            padding: 12px;

            border-radius: 10px;

            margin-top: 15px;

            font-size: 14px;

            display: none;

            color: #bbf7d0;

        }
    </style>

</head>

<body>

    <div class="container">

        <div class="logo">

            CASHINVESTISSEMENT

        </div>

        <div class="title">

            Connexion à votre compte

        </div>

        <div class="error" id="errorBox">

        </div>

        <div class="success" id="successBox">

        </div>

        <div class="input-box">

            <label>

                Adresse email

            </label>

            <input type="email" id="email" placeholder="Entrez votre email">

        </div>

        <div class="input-box">

            <label>

                Mot de passe

            </label>

            <input type="password" id="password" placeholder="Entrez votre mot de passe">

        </div>

        <button class="login-btn" onclick="login()">

            Se connecter

        </button>

        <div class="links">

            <a href="#" onclick="forgotPassword()">

                Mot de passe oublié ?

            </a>

            <a href="register.html">

                Créer un compte

            </a>

        </div>

        <div class="footer">

            © 1997 CASHINVESTISSEMENT<br>

            Plateforme internationale d’investissement.

        </div>

    </div>

    <script type="module">

        import { initializeApp }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {

            getAuth,
            signInWithEmailAndPassword,
            sendPasswordResetEmail

        }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        import {

            getFirestore,
            doc,
            getDoc

        }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {

            apiKey: "AIzaSyCRIgagg1fOm_1fcYLCA79C44i2BKTiujQ",
            authDomain: "cashinvestissement-f8104.firebaseapp.com",
            projectId: "cashinvestissement-f8104",
            storageBucket: "cashinvestissement-f8104.firebasestorage.app",
            messagingSenderId: "645010004253",
            appId: "1:645010004253:web:e885536adcc0f1966e69f4"

        };

        const app =
            initializeApp(firebaseConfig);

        const auth =
            getAuth(app);

        const db =
            getFirestore(app);

        function showError(message) {

            const box =
                document.getElementById("errorBox");

            box.style.display = "block";

            box.innerText = message;

            setTimeout(() => {

                box.style.display = "none";

            }, 4000);

        }

        function showSuccess(message) {

            const box =
                document.getElementById("successBox");

            box.style.display = "block";

            box.innerText = message;

            setTimeout(() => {

                box.style.display = "none";

            }, 4000);

        }

        window.login =
            async function () {

                const email =
                    document.getElementById("email").value;

                const password =
                    document.getElementById("password").value;

                if (email === "" || password === "") {

                    showError(
                        "Veuillez remplir tous les champs."
                    );

                    return;

                }

                try {

                    const userCredential =
                        await signInWithEmailAndPassword(

                            auth,
                            email,
                            password

                        );

                    const user =
                        userCredential.user;

                    const userRef =
                        doc(db, "users", user.uid);

                    const userSnap =
                        await getDoc(userRef);

                    if (userSnap.exists()) {

                        const data =
                            userSnap.data();

                        if (data.blocked === true) {

                            showError(
                                "Votre compte a été bloqué."
                            );

                            return;

                        }

                    }

                    showSuccess(
                        "Connexion réussie."
                    );

                    setTimeout(() => {

                        window.location.href =
                            "dashboard.html";

                    }, 1500);

                } catch (error) {

                    showError(
                        "Email ou mot de passe incorrect."
                    );

                }

            }

        window.forgotPassword =
            async function () {

                const email =
                    prompt(
                        "Entrez votre adresse email."
                    );

                if (!email) {

                    return;

                }

                try {

                    await sendPasswordResetEmail(
                        auth,
                        email
                    );

                    showSuccess(
                        "Un lien de réinitialisation a été envoyé sur votre email."
                    );

                } catch (error) {

                    showError(
                        "Impossible d’envoyer l’email."
                    );

                }

            }

    </script>

</body>

</html>
