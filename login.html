<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - CashInvestissement</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        header {
            background: #004aad;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .1);
        }

        h2 {
            text-align: center;
            color: #004aad;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #004aad;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #003080;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <header>
        <h1>CashInvestissement</h1>
    </header>

    <div class="container">
        <div class="card">

            <h2>Connexion</h2>

            <input type="email" id="email" placeholder="Adresse Email">

            <input type="password" id="password" placeholder="Mot de passe">

            <button id="loginBtn">
                Se connecter
            </button>

            <div class="link">
                Pas encore de compte ?
                <a href="register.html">Inscription</a>
            </div>

        </div>
    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {
            getAuth,
            signInWithEmailAndPassword
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        import {
            getFirestore,
            doc,
            getDoc
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRIgagg1fOm_1fcYLCA79C44i2BKTiujQ",
            authDomain: "cashinvestissement-f8104.firebaseapp.com",
            projectId: "cashinvestissement-f8104",
            storageBucket: "cashinvestissement-f8104.firebasestorage.app",
            messagingSenderId: "645010004253",
            appId: "1:645010004253:web:e885536adcc0f1966e69f4"
        };

        const app = initializeApp(firebaseConfig);

        const auth = getAuth(app);

        const db = getFirestore(app);

        document
            .getElementById("loginBtn")
            .addEventListener("click", async () => {

                const email =
                    document.getElementById("email").value.trim();

                const password =
                    document.getElementById("password").value;

                if (!email || !password) {
                    alert("Veuillez remplir tous les champs.");
                    return;
                }

                try {

                    const userCredential =
                        await signInWithEmailAndPassword(
                            auth,
                            email,
                            password
                        );

                    const user = userCredential.user;

                    const userDoc =
                        await getDoc(
                            doc(db, "users", user.uid)
                        );

                    if (!userDoc.exists()) {

                        alert("Utilisateur introuvable.");
                        return;

                    }

                    const data = userDoc.data();

                    if (data.compteBloque === true) {

                        alert("Votre compte est bloqué.");
                        return;

                    }

                    if (data.role === "admin") {

                        window.location.href =
                            "admin.html";

                    } else {

                        window.location.href =
                            "dashboard.html";

                    }

                } catch (error) {

                    alert(error.message);

                }

            });

    </script>

</body>

</html>
