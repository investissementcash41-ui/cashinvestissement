<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Dashboard - CASHINVESTISSEMENT
    </title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {

            background:
                linear-gradient(135deg,
                    #020617,
                    #0f172a,
                    #1e3a8a,
                    #7f1d1d);

            color: white;

            min-height: 100vh;

            padding: 20px;

        }

        .header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            flex-wrap: wrap;

            gap: 15px;

            margin-bottom: 30px;

        }

        .logo {

            font-size: 26px;

            font-weight: bold;

            color: #38bdf8;

        }

        .logout {

            padding: 12px 20px;

            border: none;

            border-radius: 12px;

            background: #dc2626;

            color: white;

            font-size: 14px;

            cursor: pointer;

        }

        .cards {

            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(220px, 1fr));

            gap: 20px;

            margin-bottom: 30px;

        }

        .card {

            background:
                rgba(255, 255, 255, 0.05);

            padding: 22px;

            border-radius: 20px;

            border:
                1px solid rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(10px);

        }

        .card h3 {

            font-size: 15px;

            margin-bottom: 12px;

            color: #d6d6d6;

        }

        .card h2 {

            font-size: 24px;

            color: #38bdf8;

        }

        .code-box {

            background:
                rgba(255, 255, 255, 0.05);

            padding: 25px;

            border-radius: 20px;

            margin-bottom: 30px;

            border:
                1px solid rgba(255, 255, 255, 0.08);

            text-align: center;

        }

        .code-box h2 {

            margin-bottom: 15px;

            font-size: 20px;

            color: #ffffff;

        }

        .code {

            font-size: 28px;

            font-weight: bold;

            letter-spacing: 2px;

            color: #fde047;

            margin-bottom: 20px;

        }

        .copy-btn {

            padding: 14px 25px;

            border: none;

            border-radius: 12px;

            background:
                linear-gradient(90deg,
                    #2563eb,
                    #dc2626);

            color: white;

            font-size: 14px;

            cursor: pointer;

        }

        .actions {

            display: grid;

            grid-template-columns:
                1fr 1fr;

            gap: 15px;

            margin-bottom: 30px;

        }

        .actions a {

            text-decoration: none;

            padding: 16px;

            border-radius: 12px;

            text-align: center;

            font-size: 15px;

            font-weight: bold;

            color: white;

        }

        .deposit {

            background: #2563eb;

        }

        .withdraw {

            background: #dc2626;

        }

        .section-title {

            font-size: 22px;

            margin-bottom: 20px;

            margin-top: 30px;

        }

        .plan {

            background:
                rgba(255, 255, 255, 0.05);

            padding: 22px;

            border-radius: 20px;

            margin-bottom: 20px;

            border:
                1px solid rgba(255, 255, 255, 0.08);

        }

        .plan h2 {

            font-size: 20px;

            margin-bottom: 15px;

            color: #38bdf8;

        }

        .plan p {

            font-size: 14px;

            line-height: 30px;

            color: #d6d6d6;

        }

        .plan button {

            width: 100%;

            padding: 15px;

            margin-top: 20px;

            border: none;

            border-radius: 12px;

            background:
                linear-gradient(90deg,
                    #2563eb,
                    #dc2626);

            color: white;

            font-size: 14px;

            cursor: pointer;

        }

        .active-plan {

            background:
                rgba(34, 197, 94, 0.12);

            padding: 20px;

            border-radius: 18px;

            margin-bottom: 18px;

            border:
                1px solid rgba(34, 197, 94, 0.2);

        }

        .active-plan h3 {

            margin-bottom: 12px;

            color: #22c55e;

            font-size: 18px;

        }

        .active-plan p {

            font-size: 14px;

            line-height: 30px;

            color: #d6d6d6;

        }

        footer {

            text-align: center;

            margin-top: 40px;

            font-size: 13px;

            color: #94a3b8;

            line-height: 25px;

        }

        @media(max-width:768px) {

            .actions {

                grid-template-columns: 1fr;

            }

        }
    </style>

</head>

<body>

    <div class="header">

        <div class="logo">

            CASHINVESTISSEMENT

        </div>

        <button class="logout" onclick="logout()">

            Déconnexion

        </button>

    </div>

    <div class="cards">

        <div class="card">

            <h3>

                Solde Principal

            </h3>

            <h2 id="solde">

                0 HTG

            </h2>

        </div>

        <div class="card">

            <h3>

                HTG de Fidélité

            </h3>

            <h2 id="fidelite">

                100 HTG

            </h2>

        </div>

        <div class="card">

            <h3>

                Solde Parrainage

            </h3>

            <h2 id="parrainage">

                0 HTG

            </h2>

        </div>

        <div class="card">

            <h3>

                Total Investi

            </h3>

            <h2 id="totalInvesti">

                0 HTG

            </h2>

        </div>

        <div class="card">

            <h3>

                Gains Quotidiens

            </h3>

            <h2 id="gainsQuotidiens">

                0 HTG

            </h2>

        </div>

        <div class="card">

            <h3>

                Plans Actifs

            </h3>

            <h2 id="plansActifs">

                0

            </h2>

        </div>

    </div>

    <div class="code-box">

        <h2>

            Votre Code de Parrainage

        </h2>

        <div class="code" id="monCode">

            Chargement...

        </div>

        <button class="copy-btn" onclick="copierCode()">

            Copier le code

        </button>

    </div>

    <div class="actions">

        <a href="deposit.html" class="deposit">

            Dépôt

        </a>

        <a href="withdraw.html" class="withdraw">

            Retrait

        </a>

    </div>

    <h2 class="section-title">

        Mes Plans Actifs

    </h2>

    <div id="activePlans">

    </div>

    <h2 class="section-title">

        Plans Disponibles

    </h2>

    <div id="plansContainer">

    </div>

    <footer>

        © 1997 CASHINVESTISSEMENT

    </footer>

    <script type="module">

        import { initializeApp }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {

            getAuth,
            onAuthStateChanged,
            signOut

        }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        import {

            getFirestore,
            doc,
            getDoc,
            updateDoc

        }

            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {

            apiKey: "AIzaSyCRIgagg1fOm_1fcYLCA79C44i2BKTiujQ",
            authDomain: "cashinvestissement-f8104.firebaseapp.com",
            projectId: "cashinvestissement-f8104",
            storageBucket: "cashinvestissement-f8104.firebasestorage.app",
            messagingSenderId: "645010004253",
            appId: "1:645010004253:web:e885536adcc0f1966e69f4"

        };

        const app =
            initializeApp(firebaseConfig);

        const auth =
            getAuth(app);

        const db =
            getFirestore(app);

        const plans = [

            {
                nom: "PLAN STARTER",
                montant: 1500,
                gain: 60,
                jours: 300,
                total: 18000
            },

            {
                nom: "PLAN SILVER",
                montant: 5000,
                gain: 200,
                jours: 300,
                total: 60000
            },

            {
                nom: "PLAN GOLD",
                montant: 15000,
                gain: 600,
                jours: 300,
                total: 180000
            },

            {
                nom: "PLAN VIP",
                montant: 50000,
                gain: 2000,
                jours: 60,
                total: 120000
            },

            {
                nom: "PLAN BUSINESS",
                montant: 75000,
                gain: 3000,
                jours: 60,
                total: 180000
            }

        ];

        let currentUser = null;

        let userData = null;

        onAuthStateChanged(auth,
            async (user) => {

                if (user) {

                    currentUser = user;

                    const userRef =
                        doc(db, "users", user.uid);

                    const userSnap =
                        await getDoc(userRef);

                    if (userSnap.exists()) {

                        userData =
                            userSnap.data();

                        loadDashboard();

                    }

                } else {

                    window.location.href =
                        "login.html";

                }

            });

        function loadDashboard() {

            document.getElementById(
                "solde"
            ).innerText =
                userData.solde + " HTG";

            document.getElementById(
                "fidelite"
            ).innerText =
                userData.fidelite + " HTG";

            document.getElementById(
                "parrainage"
            ).innerText =
                userData.parrainage + " HTG";

            document.getElementById(
                "totalInvesti"
            ).innerText =
                userData.totalInvesti + " HTG";

            document.getElementById(
                "gainsQuotidiens"
            ).innerText =
                userData.gainsQuotidiens + " HTG";

            document.getElementById(
                "plansActifs"
            ).innerText =
                userData.plans.length;

            document.getElementById(
                "monCode"
            ).innerText =
                userData.codeParrainage;

            loadPlans();

            loadActivePlans();

        }

        window.copierCode =
            function () {

                navigator.clipboard.writeText(

                    document.getElementById(
                        "monCode"
                    ).innerText

                );

                alert(
                    "Code copié avec succès."
                );

            }

        function loadPlans() {

            const container =
                document.getElementById(
                    "plansContainer"
                );

            container.innerHTML = "";

            plans.forEach(plan => {

                const dejaAchete =
                    userData.plans.some(
                        p => p.nom === plan.nom
                    );

                container.innerHTML += `

<div class="plan">

<h2>
${plan.nom}
</h2>

<p>

Montant :
${plan.montant} HTG<br>

Durée :
${plan.jours} jours<br>

Profit quotidien :
4%<br>

Gain quotidien :
${plan.gain} HTG<br>

Total à la fin :
${plan.total} HTG

</p>

<button
${dejaAchete ? "disabled" : ""}
onclick="acheterPlan('${plan.nom}')">

${dejaAchete
                        ?
                        "Plan déjà acheté"
                        :
                        "Acheter ce plan"}

</button>

</div>

`;

            });

        }

        function loadActivePlans() {

            const container =
                document.getElementById(
                    "activePlans"
                );

            container.innerHTML = "";

            userData.plans.forEach(plan => {

                container.innerHTML += `

<div class="active-plan">

<h3>

${plan.nom}

</h3>

<p>

Investissement :
${plan.montant} HTG<br>

Gain quotidien :
${plan.gain} HTG<br>

Durée :
${plan.jours} jours<br>

Total final :
${plan.total} HTG

</p>

</div>

`;

            });

        }

        window.acheterPlan =
            async function (nom) {

                const plan =
                    plans.find(
                        p => p.nom === nom
                    );

                let totalDisponible =

                    userData.solde
                    +
                    userData.fidelite
                    +
                    userData.parrainage;

                if (totalDisponible < plan.montant) {

                    alert(
                        "Solde insuffisant."
                    );

                    return;

                }

                let reste =
                    plan.montant;

                if (userData.fidelite >= reste) {

                    userData.fidelite -= reste;

                    reste = 0;

                } else {

                    reste -= userData.fidelite;

                    userData.fidelite = 0;

                }

                if (reste > 0) {

                    if (userData.parrainage >= reste) {

                        userData.parrainage -= reste;

                        reste = 0;

                    } else {

                        reste -= userData.parrainage;

                        userData.parrainage = 0;

                    }

                }

                if (reste > 0) {

                    userData.solde -= reste;

                }

                userData.totalInvesti +=
                    plan.montant;

                userData.gainsQuotidiens +=
                    plan.gain;

                userData.plans.push(plan);

                await updateDoc(

                    doc(db, "users", currentUser.uid),

                    {

                        solde: userData.solde,

                        fidelite: userData.fidelite,

                        parrainage: userData.parrainage,

                        totalInvesti: userData.totalInvesti,

                        gainsQuotidiens: userData.gainsQuotidiens,

                        plans: userData.plans

                    }

                );

                alert(
                    "Plan acheté avec succès."
                );

                loadDashboard();

            }

        window.logout =
            async function () {

                await signOut(auth);

                window.location.href =
                    "login.html";

            }

    </script>

</body>

</html>
